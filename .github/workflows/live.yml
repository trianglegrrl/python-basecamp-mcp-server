name: live

on:
  workflow_dispatch:
    inputs:
      cleanup_only:
        description: 'Only run the cleanup script (do not run lifecycle tests)'
        required: false
        default: 'false'

jobs:
  live:
    runs-on: ubuntu-latest
    env:
      BASECAMP_CLIENT_ID: ${{ secrets.BASECAMP_CLIENT_ID }}
      BASECAMP_CLIENT_SECRET: ${{ secrets.BASECAMP_CLIENT_SECRET }}
      BASECAMP_ACCOUNT_ID: ${{ secrets.BASECAMP_ACCOUNT_ID }}
      BASECAMP_TEST_PROJECT_ID: ${{ secrets.BASECAMP_TEST_PROJECT_ID }}
      BASECAMP_TEST_REFRESH_TOKEN: ${{ secrets.BASECAMP_TEST_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-asyncio
      - name: lifecycle tests
        if: ${{ inputs.cleanup_only != 'true' }}
        run: make test-live
      - name: cleanup
        if: ${{ always() }}
        run: make test-live-cleanup
